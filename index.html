<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #000; border: 4px solid #FF6F00; cursor: none; }
        .ui { position: absolute; text-align: center; }
        button { background: #FF6F00; color: white; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>
    <div id="menu" class="ui">
        <h1>UNICITY GAME</h1>
        <button onclick="startGame()">START</button><br>
        <button onclick="showReward()">REWARD: <span id="rewardCount">0</span></button>
    </div>
    <canvas id="gameCanvas" style="display:none;"></canvas>
    <div id="status" class="ui" style="display:none; top: 10px;">Score: 0</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        let score = 0, uScore = 0, totalBigU = 0, gameOver = false, gameState = 'menu';
        let speed = 2, bonusU = null, basket = { x: 160, y: 550, w: 80, h: 20 }, items = [];
        const letters = ['N', 'I', 'T', 'C', 'Y'];

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('status').style.display = 'block';
            gameState = 'playing';
            update();
        }

        function showReward() { alert("You have collected " + totalBigU + " Big U Rewards!"); }

        setInterval(() => { if(gameState === 'playing') speed += 0.5; }, 10000);

        function spawnItem() {
            if (gameState !== 'playing') return;
            const rand = Math.random() * 11;
            let char = (rand < 1) ? 'U' : letters[Math.floor(Math.random() * letters.length)];
            items.push({ x: Math.random() * 370, y: 0, char: char, color: char === 'U' ? '#FF6F00' : '#FFFFFF' });
        }
        setInterval(spawnItem, 1000);

        function update() {
            if (gameState !== 'playing') return;
            if (gameOver) {
                ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText("GAME OVER", 200, 300);
                setTimeout(() => location.reload(), 2000);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF6F00"; ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

            if (uScore > 0 && uScore % 50 === 0 && !bonusU) {
                bonusU = { x: Math.random() * 350, y: 0 };
            }

            if (bonusU) {
                ctx.fillStyle = "gold"; ctx.font = "bold 60px Arial"; ctx.fillText("U", bonusU.x, bonusU.y += 2);
                if (bonusU.y + 60 > basket.y && bonusU.x > basket.x && bonusU.x < basket.x + basket.w) {
                    score += 50; totalBigU++; bonusU = null; document.getElementById('rewardCount').innerText = totalBigU;
                }
                if (bonusU.y > 600) bonusU = null;
            }

            items.forEach((item, index) => {
                item.y += speed;
                ctx.fillStyle = item.color; ctx.font = "bold 30px Arial";
                ctx.fillText(item.char, item.x, item.y);
                if (item.y + 30 > basket.y && item.x > basket.x && item.x < basket.x + basket.w) {
                    items.splice(index, 1);
                    if(item.char === 'U') { score += 2; uScore++; } else { score += 1; }
                    document.getElementById("status").innerText = "Score: " + score;
                } else if (item.y > canvas.height) { gameOver = true; }
            });
            requestAnimationFrame(update);
        }
        window.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            basket.x = e.clientX - rect.left - 40;
        });
    </script>
</body>
</html>
