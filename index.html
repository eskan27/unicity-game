<!DOCTYPE html>
<html>
<head>
    <title>UNICITY Game</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #menu { text-align: center; }
        canvas { background: #000; border: 4px solid #FF6F00; cursor: none; display: none; }
        button { background: #FF6F00; color: white; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; margin: 10px; border-radius: 5px; }
        #status { position: absolute; top: 20px; font-size: 24px; display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>UNICITY LABS</h1>
        <button onclick="startGame()">START GAME</button><br>
        <button onclick="alert('Collected Big U Rewards: ' + totalBigU)">REWARD: <span id="rewardCount">0</span></button>
    </div>

    <div id="status">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        let score = 0, uScore = 0, totalBigU = 0, gameState = 'menu', speed = 2;
        let particles = [], items = [], bonusBox = null, bonusU = null;
        let basket = { x: 160, y: 550, w: 80, h: 20 };

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('status').style.display = 'block';
            gameState = 'playing';
            loop();
        }

        // حرف U با نسبت 1 به 10 (کمیاب)
        function spawnItem() {
            if (gameState !== 'playing') return;
            const others = ['N', 'I', 'T', 'C', 'Y'];
            const rand = Math.floor(Math.random() * 11);
            let char = (rand === 0) ? 'U' : others[Math.floor(Math.random() * others.length)];
            
            items.push({ x: Math.random() * 370, y: 0, char: char, color: char === 'U' ? '#FF6F00' : '#FFFFFF' });
        }
        setInterval(spawnItem, 800);
        setInterval(() => { if(gameState === 'playing') speed += 0.2; }, 10000);

        function loop() {
            if (gameState !== 'playing') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم سبد
            ctx.fillStyle = "#FF6F00";
            ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

            // مدیریت ذرات
            particles.forEach((p, i) => {
                p.radius -= 0.5;
                ctx.fillStyle = "orange";
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                if(p.radius <= 0) particles.splice(i, 1);
            });

            // مدیریت آیتم‌ها
            items.forEach((item, index) => {
                item.y += speed;
                ctx.fillStyle = item.color; ctx.font = "bold 30px Arial"; ctx.fillText(item.char, item.x, item.y);
                
                // برخورد
                if (item.y + 30 > basket.y && item.x > basket.x && item.x < basket.x + basket.w) {
                    if(item.char === 'U') { particles.push({x: item.x, y: item.y, radius: 20}); score += 2; uScore++; } 
                    else { score += 1; }
                    items.splice(index, 1);
                    document.getElementById('status').innerText = "Score: " + score;
                } 
                // شرط باخت (برخورد به کف)
                else if (item.y > canvas.height) {
                    gameState = 'over';
                    ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign = "center";
                    ctx.fillText("GAME OVER", 200, 300);
                    setTimeout(() => location.reload(), 2000);
                }
            });
            requestAnimationFrame(loop);
        }

        window.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            basket.x = e.clientX - rect.left - 40;
        });
    </script>
</body>
</html>
