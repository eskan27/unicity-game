<!DOCTYPE html>
<html>
<head>
    <title>UNICITY Game</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #menu { text-align: center; }
        canvas { background: #000; border: 4px solid #FF6F00; cursor: none; display: none; }
        button { background: #FF6F00; color: white; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; margin: 10px; border-radius: 5px; }
        #status { position: absolute; top: 20px; font-size: 24px; display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>UNICITY LABS</h1>
        <button onclick="startGame()">START GAME</button><br>
        <button onclick="alert('Collected Big U Rewards: ' + totalBigU)">REWARD: <span id="rewardCount">0</span></button>
    </div>

    <div id="status">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        let score = 0, uScore = 0, totalBigU = 0, gameState = 'menu', speed = 2;
        let particles = [], items = [], bonusBox = null, bonusU = null;
        let basket = { x: 160, y: 550, w: 80, h: 20 };

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('status').style.display = 'block';
            gameState = 'playing';
            loop();
        }

        // تولید حروف کاملاً تصادفی
        function spawnItem() {
            if (gameState !== 'playing') return;
            const letters = ['N', 'I', 'T', 'C', 'Y', 'U'];
            let char = letters[Math.floor(Math.random() * letters.length)];
            items.push({ x: Math.random() * 370, y: 0, char: char, color: char === 'U' ? '#FF6F00' : '#FFFFFF' });
        }
        setInterval(spawnItem, 1000);
        setInterval(() => { if(gameState === 'playing') speed += 0.2; }, 10000);

        function loop() {
            if (gameState !== 'playing') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ترسیم سبد
            ctx.fillStyle = "#FF6F00";
            ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

            // مدیریت ذرات انفجار
            particles.forEach((p, i) => {
                p.radius -= 0.2;
                ctx.fillStyle = "orange";
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                if(p.radius <= 0) particles.splice(i, 1);
            });

            // مدیریت باکس جایزه
            if (uScore > 0 && uScore % 50 === 0 && !bonusBox && !bonusU) bonusBox = { x: Math.random() * 350, y: 0 };
            if (bonusBox) {
                ctx.fillStyle = "gold"; ctx.fillRect(bonusBox.x, bonusBox.y += 2, 40, 40);
                if (bonusBox.y + 40 > basket.y && bonusBox.x > basket.x && bonusBox.x < basket.x + basket.w) { 
                    bonusU = { x: bonusBox.x, y: bonusBox.y }; bonusBox = null; 
                }
            }
            if (bonusU) {
                ctx.fillStyle = "gold"; ctx.font = "bold 60px Arial"; ctx.fillText("U", bonusU.x, bonusU.y);
                setTimeout(() => { totalBigU++; bonusU = null; document.getElementById('rewardCount').innerText = totalBigU; }, 2000);
            }

            // مدیریت آیتم‌ها
            items.forEach((item, index) => {
                item.y += speed;
                ctx.fillStyle = item.color; ctx.font = "bold 30px Arial"; ctx.fillText(item.char, item.x, item.y);
                
                if (item.y + 30 > basket.y && item.x > basket.x && item.x < basket.x + basket.w) {
                    if(item.char === 'U') { particles.push({x: item.x, y: item.y, radius: 20}); score += 2; uScore++; } 
                    else { score += 1; }
                    items.splice(index, 1);
                    document.getElementById('status').innerText = "Score: " + score;
                } else if (item.y > canvas.height) { alert("GAME OVER! Final Score: " + score); location.reload(); }
            });
            requestAnimationFrame(loop);
        }

        window.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            basket.x = e.clientX - rect.left - 40;
        });
    </script>
</body>
</html>
