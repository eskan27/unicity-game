<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { background: #000; border: 4px solid #FF6F00; cursor: none; }
    </style>
</head>
<body>
    <div id="status" style="font-size: 24px; margin-bottom: 10px;">Score: 0</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        let score = 0;
        let uScore = 0; // برای شمارش تعداد U های گرفته شده
        let gameOver = false;
        let speed = 2;
        let bonusU = null;
        let basket = { x: 160, y: 550, w: 80, h: 20 };
        let items = [];
        const letters = ['N', 'I', 'T', 'C', 'Y'];

        setInterval(() => { if(!gameOver) speed += 0.5; }, 10000);

        function spawnItem() {
            if (gameOver) return;
            const rand = Math.random() * 11;
            let char = (rand < 1) ? 'U' : letters[Math.floor(Math.random() * letters.length)];
            items.push({ x: Math.random() * 370, y: 0, char: char, color: char === 'U' ? '#FF6F00' : '#FFFFFF' });
        }
        setInterval(spawnItem, 1000);

        function update() {
            if (gameOver) {
                ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width/2, 300);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF6F00"; ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

            // جایزه U بزرگ
            if (uScore > 0 && uScore % 50 === 0 && !bonusU) {
                bonusU = { x: Math.random() * 350, y: 0, active: true };
                setTimeout(() => { bonusU = null; }, 5000);
            }

            if (bonusU) {
                ctx.fillStyle = "gold"; ctx.font = "bold 60px Arial";
                ctx.fillText("U", bonusU.x, bonusU.y += 2);
                if (bonusU.y + 60 > basket.y && bonusU.x > basket.x && bonusU.x < basket.x + basket.w) {
                    score += 50; bonusU = null;
                }
            }

            items.forEach((item, index) => {
                item.y += speed;
                ctx.fillStyle = item.color; ctx.font = "bold 30px Arial";
                ctx.fillText(item.char, item.x, item.y);

                if (item.y + 30 > basket.y && item.x > basket.x && item.x < basket.x + basket.w) {
                    items.splice(index, 1);
                    if(item.char === 'U') { score += 2; uScore++; } else { score += 1; }
                    document.getElementById("status").innerText = "Score: " + score;
                } else if (item.y > canvas.height) { gameOver = true; }
            });
            requestAnimationFrame(update);
        }
        window.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            basket.x = e.clientX - rect.left - 40;
        });
        update();
    </script>
</body>
</html>
