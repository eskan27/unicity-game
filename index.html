<!DOCTYPE html>
<html>
<head>
    <title>UNICITY Game</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #menu { text-align: center; max-width: 500px; }
        canvas { background: #000; border: 4px solid #FF6F00; cursor: none; display: none; }
        button { background: #FF6F00; color: white; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; margin: 10px; border-radius: 5px; display: block; width: 200px; margin-left: auto; margin-right: auto; }
        #status { position: absolute; top: 20px; font-size: 24px; display: none; }
        #aboutModal { display: none; background: #333; padding: 20px; border-radius: 10px; margin-top: 20px; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>UNICITY LABS</h1>
        <button onclick="startGame()">START GAME</button>
        <button onclick="alert('Collected Big U Rewards: ' + totalBigU)">REWARD: <span id="rewardCount">0</span></button>
        <button onclick="toggleAbout()">ABOUT</button>
        <div id="aboutModal">
            <strong>About:</strong> Catch letters! The <strong>U</strong> is rare. Every 10 U's, you get a special logo reward. Don't miss!
        </div>
    </div>

    <div id="status">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 400; canvas.height = 600;

        let score = 0, uScore = 0, totalBigU = 0, gameState = 'menu', speed = 2;
        let items = [], bonusBox = null, bonusU = null;
        let basket = { x: 160, y: 550, w: 80, h: 20 };

        // تابع رسم لوگوی U به شکل خاص (خطوط روی هم)
        function drawCustomU(x, y, size) {
            ctx.fillStyle = "gold";
            for(let i=0; i<6; i++) {
                ctx.fillRect(x, y + (i*10), size - (i%2*5), 6);
            }
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('status').style.display = 'block';
            gameState = 'playing';
            
            // افزایش سرعت دقیق هر 10 ثانیه
            setInterval(() => { if(gameState === 'playing') speed += 0.5; }, 10000);
            loop();
        }

        function toggleAbout() {
            const modal = document.getElementById('aboutModal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }

        function spawnItem() {
            if (gameState !== 'playing') return;
            const others = ['N', 'I', 'T', 'C', 'Y'];
            const rand = Math.floor(Math.random() * 11);
            let char = (rand === 0) ? 'U' : others[Math.floor(Math.random() * others.length)];
            items.push({ x: Math.random() * 370, y: 0, char: char, color: char === 'U' ? '#FF6F00' : '#FFFFFF' });
        }
        setInterval(spawnItem, 800);

        function loop() {
            if (gameState !== 'playing') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#FF6F00"; ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

            // باکس جایزه (هر 10 تا U)
            if (uScore > 0 && uScore % 10 === 0 && !bonusBox && !bonusU) bonusBox = { x: Math.random() * 350, y: 0 };
            if (bonusBox) {
                ctx.fillStyle = "gold"; ctx.fillRect(bonusBox.x, bonusBox.y += 2, 40, 40);
                if (bonusBox.y + 40 > basket.y && bonusBox.x > basket.x && bonusBox.x < basket.x + basket.w) { 
                    bonusU = { x: bonusBox.x, y: bonusBox.y }; bonusBox = null; 
                }
            }
            if (bonusU) {
                drawCustomU(bonusU.x, bonusU.y, 50);
                setTimeout(() => { totalBigU++; bonusU = null; document.getElementById('rewardCount').innerText = totalBigU; }, 2000);
            }

            items.forEach((item, index) => {
                item.y += speed;
                if(item.char === 'U') drawCustomU(item.x, item.y, 30);
                else { ctx.fillStyle = "white"; ctx.font = "30px Arial"; ctx.fillText(item.char, item.x, item.y); }
                
                if (item.y + 30 > basket.y && item.x > basket.x && item.x < basket.x + basket.w) {
                    if(item.char === 'U') { score += 2; uScore++; } else score += 1;
                    items.splice(index, 1);
                    document.getElementById('status').innerText = "Score: " + score;
                } else if (item.y > canvas.height) { gameState = 'over'; alert("GAME OVER! Score: " + score); location.reload(); }
            });
            requestAnimationFrame(loop);
        }
        window.addEventListener("mousemove", (e) => { basket.x = e.clientX - canvas.offsetLeft - 40; });
    </script>
</body>
</html>
